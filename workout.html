<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrainWeek">
<meta name="theme-color" content="#0a0a0a">
<title>TrainWeek</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #141414;
  --bg3: #1e1e1e;
  --bg4: #282828;
  --text: #f0f0f0;
  --text2: #999;
  --text3: #555;
  --accent: #c8f135;
  --accent2: #a8d020;
  --push: #ff6b35;
  --pull: #3b9eff;
  --legs: #22c55e;
  --full: #f59e0b;
  --arms: #a855f7;
  --rest: #444;
  --radius: 16px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  max-width: 430px;
  margin: 0 auto;
  overflow-x: hidden;
}

/* HEADER */
.header {
  padding: calc(var(--safe-top) + 16px) 20px 0;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 2px;
  color: var(--accent);
}

.week-nav {
  display: flex;
  align-items: center;
  gap: 12px;
}

.week-btn {
  width: 34px; height: 34px;
  background: var(--bg3);
  border: none;
  border-radius: 50%;
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.week-btn:active { background: var(--bg4); transform: scale(0.93); }

.week-label {
  font-size: 13px;
  color: var(--text2);
  font-weight: 500;
}

/* DAY STRIP */
.day-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 16px;
  scrollbar-width: none;
}
.day-strip::-webkit-scrollbar { display: none; }

.day-pill {
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 10px 14px;
  border-radius: 99px;
  cursor: pointer;
  transition: all 0.18s;
  border: 1.5px solid transparent;
  background: var(--bg2);
  min-width: 56px;
}

.day-pill.active {
  background: var(--accent);
  border-color: var(--accent);
}

.day-pill.today-pill {
  border-color: var(--accent);
}

.day-pill-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.day-pill.active .day-pill-name { color: #0a0a0a; }
.day-pill.today-pill .day-pill-name { color: var(--accent); }

.day-pill-num {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
}
.day-pill.active .day-pill-num { color: #0a0a0a; }

.day-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--text3);
}
.day-pill.active .day-dot { background: #0a0a0a55; }

/* MAIN */
.main { padding: 0 16px calc(var(--safe-bottom) + 80px); }

/* HERO CARD */
.hero-card {
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 20px;
  position: relative;
  min-height: 200px;
  background: var(--bg2);
}

.hero-img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  display: block;
  filter: brightness(0.55);
}

.hero-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
}

.hero-tag {
  display: inline-block;
  padding: 4px 12px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 1px;
  line-height: 1;
  color: #fff;
  margin-bottom: 4px;
}

.hero-subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.7);
}

.hero-rest {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
  gap: 12px;
}

.rest-icon { font-size: 52px; }

.rest-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px;
  letter-spacing: 1px;
  color: var(--text2);
}

.rest-sub { font-size: 14px; color: var(--text3); text-align: center; }

/* PROGRESS */
.progress-section {
  background: var(--bg2);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}

.progress-ring-wrap { flex-shrink: 0; }

.progress-info { flex: 1; }

.progress-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: var(--accent);
  line-height: 1;
}

.progress-text {
  font-size: 12px;
  color: var(--text2);
  margin-top: 2px;
}

.progress-bar-wrap {
  height: 4px;
  background: var(--bg4);
  border-radius: 99px;
  margin-top: 8px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--accent);
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

/* SECTION */
.section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  margin: 20px 0 10px;
  padding-left: 4px;
}

/* EXERCISE CARD */
.ex-card {
  background: var(--bg2);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin-bottom: 10px;
  transition: transform 0.12s;
  border: 1px solid transparent;
}

.ex-card.done-card {
  opacity: 0.55;
  border-color: var(--bg4);
}

.ex-card-inner {
  display: flex;
  align-items: stretch;
  gap: 0;
}

.ex-thumb-wrap {
  width: 80px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}

.ex-thumb {
  width: 80px;
  height: 80px;
  object-fit: cover;
  display: block;
  filter: brightness(0.75);
}

.ex-body {
  flex: 1;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
}

.ex-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.ex-card.done-card .ex-name {
  text-decoration: line-through;
  color: var(--text3);
}

.ex-sets {
  font-size: 12px;
  color: var(--accent);
  font-weight: 500;
}

.ex-note {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
}

.ex-check-btn {
  width: 52px;
  flex-shrink: 0;
  background: none;
  border: none;
  border-left: 1px solid var(--bg3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text3);
  font-size: 20px;
  transition: background 0.12s, color 0.12s;
}

.ex-check-btn:active { background: var(--bg3); }
.ex-check-btn.checked { color: var(--accent); }

/* NOTE BOX */
.note-box {
  background: var(--bg2);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  font-size: 13px;
  color: var(--text2);
  border-left: 3px solid var(--accent);
  margin-top: 8px;
  line-height: 1.5;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 20px calc(var(--safe-bottom) + 12px);
  display: flex;
  justify-content: space-around;
  border-top: 1px solid rgba(255,255,255,0.06);
  z-index: 200;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  opacity: 0.45;
  transition: opacity 0.15s;
  font-size: 10px;
  color: var(--text2);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  border: none;
  background: none;
}

.nav-item.active-nav { opacity: 1; color: var(--accent); }
.nav-item svg { width: 22px; height: 22px; }

/* RESET WEEK BTN */
.reset-btn {
  display: block;
  width: 100%;
  padding: 14px;
  background: var(--bg2);
  border: 1px solid var(--bg4);
  border-radius: var(--radius-sm);
  color: var(--text3);
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  margin-top: 20px;
  transition: background 0.15s;
  text-align: center;
}
.reset-btn:active { background: var(--bg3); }

/* INSTALL BANNER */
.install-banner {
  background: var(--accent);
  color: #0a0a0a;
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.install-banner span { flex:1; }
.install-banner button {
  background: #0a0a0a22;
  border: none;
  color: #0a0a0a;
  font-size: 16px;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 6px;
}

/* STATS PAGE */
.stats-page { padding: 20px 16px calc(var(--safe-bottom) + 80px); }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: var(--bg2);
  border-radius: var(--radius-sm);
  padding: 16px;
  text-align: center;
}
.stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px;
  color: var(--accent);
  line-height: 1;
}
.stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; }
.week-history { margin-top: 8px; }
.history-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--bg3);
  font-size: 13px;
}
.history-row-day { color: var(--text2); }
.history-row-pct { color: var(--accent); font-weight: 600; }

.page { display: none; }
.page.active-page { display: block; }
</style>
</head>

const DAYS_SHORT = ["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];

function getMonday(offset) {
  const today = new Date();
  const dow = today.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  const mon = new Date(today);
  mon.setDate(today.getDate() + diff + offset * 7);
  return mon;
}

function isToday(d) {
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

function storageKey(weekOff, day) {
  const mon = getMonday(weekOff);
  return `tw_${mon.getFullYear()}_${mon.getMonth()}_${mon.getDate()}_d${day}`;
}

function getChecked(weekOff, day) {
  try { return JSON.parse(localStorage.getItem(storageKey(weekOff, day)) || '{}'); }
  catch { return {}; }
}

function setChecked(weekOff, day, obj) {
  try { localStorage.setItem(storageKey(weekOff, day), JSON.stringify(obj)); }
  catch {}
}

function toggleEx(si, ei) {
  const obj = getChecked(weekOffset, selectedDay);
  const k = `${si}_${ei}`;
  obj[k] = !obj[k];
  setChecked(weekOffset, selectedDay, obj);
  renderMain();
}

function changeWeek(dir) {
  weekOffset += dir;
  selectedDay = null;
  render();
}

function selectDay(idx) {
  selectedDay = idx;
  renderStrip();
  renderMain();
}

function showPage(page) {
  document.getElementById('pageHome').classList.toggle('active-page', page === 'home');
  document.getElementById('pageStats').classList.toggle('active-page', page === 'stats');
  document.getElementById('navHome').classList.toggle('active-nav', page === 'home');
  document.getElementById('navStats').classList.toggle('active-nav', page === 'stats');
  if (page === 'stats') renderStats();
}

function getDayProgress(wOff, day) {
  const prog = PROGRAM[day];
  if (prog.rest) return null;
  const obj = getChecked(wOff, day);
  let total = 0, done = 0;
  prog.sections.forEach((s, si) => s.exercises.forEach((_, ei) => {
    total++;
    if (obj[`${si}_${ei}`]) done++;
  }));
  return { total, done, pct: total > 0 ? Math.round(done / total * 100) : 0 };
}

function renderStrip() {
  const mon = getMonday(weekOffset);
  const strip = document.getElementById('dayStrip');
  strip.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const prog = PROGRAM[i];
    const isSelected = selectedDay === i;
    const isTod = isToday(d) && weekOffset === 0;
    const pill = document.createElement('div');
    pill.className = 'day-pill' + (isSelected ? ' active' : '') + (isTod && !isSelected ? ' today-pill' : '');
    pill.onclick = () => selectDay(i);
    const pr = getDayProgress(weekOffset, i);
    const dotColor = pr && pr.pct === 100 ? 'var(--accent)' : (pr ? 'var(--text3)' : '#333');
    pill.innerHTML = `
      <span class="day-pill-name">${DAYS_SHORT[i]}</span>
      <span class="day-pill-num">${d.getDate()}</span>
      <div class="day-dot" style="background:${isSelected ? '#0a0a0a55' : dotColor}"></div>`;
    strip.appendChild(pill);
  }
  const mon2 = getMonday(weekOffset);
  const sun = new Date(mon2); sun.setDate(mon2.getDate() + 6);
  document.getElementById('weekLabel').textContent = `${mon2.getDate()} ${MONTHS[mon2.getMonth()]} – ${sun.getDate()} ${MONTHS[sun.getMonth()]}`;
}

function renderMain() {
  const prog = PROGRAM[selectedDay];
  const main = document.getElementById('mainContent');

  // Install banner (iOS)
  const isIos = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.navigator.standalone;
  const bannerDismissed = localStorage.getItem('tw_banner') === '1';
  let bannerHtml = '';
  if (isIos && !isStandalone && !bannerDismissed) {
    bannerHtml = `<div class="install-banner" onclick="dismissBanner()">
      <span>📲 Installe l'app : Partage → "Sur l'écran d'accueil"</span>
      <button onclick="event.stopPropagation();dismissBanner()">✕</button>
    </div>`;
  }

  if (prog.rest) {
    main.innerHTML = `${bannerHtml}
      <div class="hero-card">
        <img class="hero-img" src="${prog.img}" alt="${prog.label}" loading="lazy">
        <div class="hero-overlay">
          <span class="hero-tag" style="background:${prog.color}22;color:${prog.color}">${prog.tag.toUpperCase()}</span>
          <div class="hero-title">${prog.name}</div>
          <div class="hero-subtitle">${prog.subtitle}</div>
        </div>
      </div>
      <div class="note-box" style="border-color:${prog.color}">${prog.note || ''}</div>`;
    return;
  }

  const pr = getDayProgress(weekOffset, selectedDay);
  const obj = getChecked(weekOffset, selectedDay);

  let sectionsHtml = '';
  prog.sections.forEach((sec, si) => {
    let exHtml = '';
    sec.exercises.forEach((ex, ei) => {
      const done = !!obj[`${si}_${ei}`];
      exHtml += `
        <div class="ex-card ${done ? 'done-card' : ''}">
          <div class="ex-card-inner">
            <div class="ex-thumb-wrap">
              <img class="ex-thumb" src="${ex.img}" alt="${ex.name}" loading="lazy">
            </div>
            <div class="ex-body">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-sets">${ex.sets}</div>
              ${ex.note ? `<div class="ex-note">${ex.note}</div>` : ''}
            </div>
            <button class="ex-check-btn ${done ? 'checked' : ''}" onclick="toggleEx(${si},${ei})" aria-label="Marquer comme fait">
              ${done ? '✓' : '○'}
            </button>
          </div>
        </div>`;
    });
    sectionsHtml += `<div class="section-label">${sec.title}</div>${exHtml}`;
  });

  main.innerHTML = `${bannerHtml}
    <div class="hero-card">
      <img class="hero-img" src="${prog.img}" alt="${prog.label}" loading="lazy">
      <div class="hero-overlay">
        <span class="hero-tag" style="background:${prog.color}33;color:${prog.color}">${prog.label.toUpperCase()}</span>
        <div class="hero-title">${prog.name}</div>
        <div class="hero-subtitle">${prog.subtitle}</div>
      </div>
    </div>
    <div class="progress-section">
      <div class="progress-info">
        <div class="progress-pct">${pr.pct}%</div>
        <div class="progress-text">${pr.done}/${pr.total} exercices complétés</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pr.pct}%"></div></div>
      </div>
    </div>
    ${sectionsHtml}
    ${prog.note ? `<div class="note-box">${prog.note}</div>` : ''}
    <button class="reset-btn" onclick="resetDay()">Réinitialiser cette séance</button>`;
}

function resetDay() {
  setChecked(weekOffset, selectedDay, {});
  renderMain();
}

function dismissBanner() {
  localStorage.setItem('tw_banner','1');
  renderMain();
}

function renderStats() {
  const content = document.getElementById('statsContent');
  let totalSessions = 0, totalEx = 0;

  let histHtml = '';
  for (let w = 0; w >= -4; w--) {
    const mon = getMonday(w);
    const label = w === 0 ? 'Cette semaine' : `Semaine du ${mon.getDate()} ${MONTHS[mon.getMonth()]}`;
    let weekDone = 0, weekTotal = 0;
    for (let d = 0; d < 7; d++) {
      const pr = getDayProgress(w, d);
      if (pr) { weekDone += pr.done; weekTotal += pr.total; totalEx += pr.done; if(pr.done>0) totalSessions++; }
    }
    const pct = weekTotal > 0 ? Math.round(weekDone / weekTotal * 100) : 0;
    if (weekTotal > 0) {
      histHtml += `<div class="history-row">
        <span class="history-row-day">${label}</span>
        <span class="history-row-pct">${pct}% <span style="color:var(--text3);font-weight:400">(${weekDone}/${weekTotal})</span></span>
      </div>`;
    }
  }

  content.innerHTML = `
    <div class="section-label" style="margin-top:8px">Vue d'ensemble</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${totalSessions}</div><div class="stat-label">Séances actives</div></div>
      <div class="stat-card"><div class="stat-num">${totalEx}</div><div class="stat-label">Exercices complétés</div></div>
    </div>
    <div class="section-label">Historique</div>
    <div class="week-history">${histHtml || '<p style="color:var(--text3);font-size:13px;padding:12px 0">Aucune donnée encore.</p>'}</div>`;
}

function render() {
  if (selectedDay === null) {
    const today = new Date();
    const dow = today.getDay();
    selectedDay = dow === 0 ? 6 : dow - 1;
  }
  renderStrip();
  renderMain();
}

render();
</script>
</body>
</html>
