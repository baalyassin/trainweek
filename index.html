<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TrainWeek">
<meta name="theme-color" content="#0a0a0a">
<title>TrainWeek</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1e1e1e; --bg4:#282828;
  --text:#f0f0f0; --text2:#999; --text3:#555;
  --accent:#c8f135; --push:#ff6b35; --pull:#3b9eff;
  --legs:#22c55e; --full:#f59e0b; --arms:#a855f7; --rest:#444;
  --r:16px; --rs:10px;
  --st: env(safe-area-inset-top,0px);
  --sb: env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}

/* HEADER */
.header{padding:calc(var(--st) + 14px) 18px 0;background:var(--bg);position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--accent)}
.week-nav{display:flex;align-items:center;gap:10px}
.week-btn{width:34px;height:34px;background:var(--bg3);border:none;border-radius:50%;color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-btn:active{background:var(--bg4);transform:scale(0.93)}
.week-label{font-size:12px;color:var(--text2);font-weight:500}

/* DAY STRIP */
.day-strip{display:flex;gap:7px;overflow-x:auto;padding-bottom:14px;scrollbar-width:none}
.day-strip::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 13px;border-radius:99px;cursor:pointer;transition:all .18s;border:1.5px solid transparent;background:var(--bg2);min-width:54px}
.day-pill.active{background:var(--accent);border-color:var(--accent)}
.day-pill.today-pill{border-color:var(--accent)}
.dpn{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.day-pill.active .dpn{color:#0a0a0a}
.day-pill.today-pill .dpn{color:var(--accent)}
.dnum{font-size:17px;font-weight:600;color:var(--text)}
.day-pill.active .dnum{color:#0a0a0a}
.ddot{width:5px;height:5px;border-radius:50%;background:var(--text3)}
.day-pill.active .ddot{background:#0a0a0a55}

/* MAIN */
.main{padding:0 14px calc(var(--sb) + 80px)}

/* HERO */
.hero-card{border-radius:var(--r);overflow:hidden;margin-bottom:16px;position:relative;background:var(--bg2)}
.hero-img{width:100%;height:210px;object-fit:cover;display:block;filter:brightness(.5)}
.hero-overlay{position:absolute;bottom:0;left:0;right:0;padding:18px;background:linear-gradient(to top,rgba(0,0,0,.88) 0%,transparent 100%)}
.hero-tag{display:inline-block;padding:3px 11px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;line-height:1;color:#fff;margin-bottom:3px}
.hero-sub{font-size:13px;color:rgba(255,255,255,.65)}

/* PROGRESS */
.progress-section{background:var(--bg2);border-radius:var(--rs);padding:13px 15px;margin-bottom:16px}
.progress-pct{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--accent);line-height:1}
.progress-text{font-size:12px;color:var(--text2);margin-top:2px}
.progress-bar-wrap{height:4px;background:var(--bg4);border-radius:99px;margin-top:8px;overflow:hidden}
.progress-bar-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .4s cubic-bezier(.4,0,.2,1)}

/* SECTION */
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin:18px 0 9px;padding-left:2px}

/* EXERCISE CARD */
.ex-card{background:var(--bg2);border-radius:var(--rs);overflow:hidden;margin-bottom:9px;border:1px solid transparent;transition:border-color .15s}
.ex-card.done-card{opacity:.5;border-color:var(--bg4)}
.ex-card-inner{display:flex;align-items:stretch}
.ex-thumb-wrap{width:78px;flex-shrink:0;overflow:hidden;position:relative;cursor:pointer}
.ex-thumb{width:78px;height:78px;object-fit:cover;display:block;filter:brightness(.72);transition:filter .2s}
.ex-thumb-wrap:active .ex-thumb{filter:brightness(.5)}
.play-badge{position:absolute;bottom:5px;right:5px;width:22px;height:22px;background:rgba(0,0,0,.65);border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none}
.play-badge svg{width:11px;height:11px;fill:var(--accent)}
.ex-body{flex:1;padding:11px 13px;display:flex;flex-direction:column;justify-content:center;gap:3px;cursor:pointer}
.ex-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.ex-card.done-card .ex-name{text-decoration:line-through;color:var(--text3)}
.ex-sets{font-size:12px;color:var(--accent);font-weight:500}
.ex-note{font-size:11px;color:var(--text3);margin-top:1px}
.ex-gif-hint{font-size:10px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:3px}
.ex-check-btn{width:50px;flex-shrink:0;background:none;border:none;border-left:1px solid var(--bg3);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px;transition:background .12s,color .12s}
.ex-check-btn:active{background:var(--bg3)}
.ex-check-btn.checked{color:var(--accent)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal-sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:0 0 calc(var(--sb) + 20px);max-height:90vh;overflow-y:auto;transform:translateY(40px);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.modal-overlay.open .modal-sheet{transform:translateY(0)}
.modal-handle{width:40px;height:4px;background:var(--bg4);border-radius:99px;margin:14px auto 0}
.modal-header{padding:16px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.5px;color:var(--text);line-height:1.1;flex:1}
.modal-close{width:32px;height:32px;background:var(--bg3);border:none;border-radius:50%;color:var(--text2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.modal-sets-badge{display:inline-block;padding:5px 14px;border-radius:99px;background:var(--accent);color:#0a0a0a;font-size:13px;font-weight:700;margin:10px 20px 0}
.modal-gif-area{margin:14px 20px 0;border-radius:var(--rs);overflow:hidden;background:var(--bg3);min-height:200px;display:flex;align-items:center;justify-content:center;position:relative}
.modal-gif{width:100%;max-height:280px;object-fit:contain;display:block}
.modal-gif-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px}
.spinner{width:32px;height:32px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-info{padding:14px 20px 0}
.modal-info-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--bg3)}
.modal-info-row:last-child{border-bottom:none}
.modal-info-icon{width:32px;height:32px;background:var(--bg3);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.modal-info-label{font-size:12px;color:var(--text3)}
.modal-info-val{font-size:13px;font-weight:600;color:var(--text)}
.modal-done-btn{display:block;width:calc(100% - 40px);margin:16px 20px 0;padding:15px;background:var(--accent);border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#0a0a0a;cursor:pointer;letter-spacing:.02em}
.modal-done-btn.already-done{background:var(--bg3);color:var(--text2)}
.modal-gif-error{text-align:center;padding:20px;color:var(--text3);font-size:13px}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(10,10,10,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:12px 20px calc(var(--sb) + 12px);display:flex;justify-content:space-around;border-top:1px solid rgba(255,255,255,.06);z-index:200}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;opacity:.4;transition:opacity .15s;font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.05em;border:none;background:none}
.nav-item.active-nav{opacity:1;color:var(--accent)}
.nav-item svg{width:22px;height:22px}

/* MISC */
.note-box{background:var(--bg2);border-radius:var(--rs);padding:12px 15px;font-size:13px;color:var(--text2);border-left:3px solid var(--accent);margin-top:8px;line-height:1.5}
.reset-btn{display:block;width:100%;padding:13px;background:var(--bg2);border:1px solid var(--bg4);border-radius:var(--rs);color:var(--text3);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:18px;text-align:center}
.install-banner{background:var(--accent);color:#0a0a0a;border-radius:var(--rs);padding:11px 15px;margin-bottom:16px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;cursor:pointer}
.install-banner span{flex:1}
.install-banner button{background:#0a0a0a22;border:none;color:#0a0a0a;font-size:16px;cursor:pointer;padding:2px 6px;border-radius:6px}
.stats-page{padding:18px 14px calc(var(--sb) + 80px)}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.stat-card{background:var(--bg2);border-radius:var(--rs);padding:15px;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--accent);line-height:1}
.stat-label{font-size:12px;color:var(--text3);margin-top:3px}
.history-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bg3);font-size:13px}
.history-row-day{color:var(--text2)}
.history-row-pct{color:var(--accent);font-weight:600}
.page{display:none}
.page.active-page{display:block}
</style>
</head>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modalSets"></div>
    <div class="modal-gif-area" id="modalGifArea">
      <div class="modal-gif-loading" id="modalLoading">
        <div class="spinner"></div>
        <span>Chargement du GIF…</span>
      </div>

</div>

<div class="header">

    </div>
  </div>
  <div class="day-strip" id="dayStrip"></div>
</div>

<div id="pageHome" class="page active-page">
  <div class="main" id="mainContent"></div>
</div>
<div id="pageStats" class="page">
  <div class="stats-page" id="statsContent"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-item active-nav" onclick="showPage('home')" id="navHome">

  </button>
  <button class="nav-item" onclick="showPage('stats')" id="navStats">

</nav>

const DAYS_SHORT=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const MONTHS=["jan","fév","mar","avr","mai","juin","juil","août","sep","oct","nov","déc"];

let weekOffset=0, selectedDay=null;
let modalSi=null, modalEi=null;

/* ── STORAGE ── */
function storageKey(w,d){const m=getMonday(w);return`tw_${m.getFullYear()}_${m.getMonth()}_${m.getDate()}_d${d}`}
function getChecked(w,d){try{return JSON.parse(localStorage.getItem(storageKey(w,d))||'{}')}catch{return{}}}
function setChecked(w,d,o){try{localStorage.setItem(storageKey(w,d),JSON.stringify(o))}catch{}}

/* ── DATE UTILS ── */
function getMonday(off){
  const t=new Date(), dow=t.getDay(), diff=dow===0?-6:1-dow;
  const m=new Date(t); m.setDate(t.getDate()+diff+off*7); return m;
}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear()}

/* ── MODAL ── */
async function openModal(si, ei) {
  modalSi=si; modalEi=ei;
  const prog=PROGRAM[selectedDay];
  const ex=prog.sections[si].exercises[ei];
  const info=EX_INFO[ex.name]||{};
  const obj=getChecked(weekOffset,selectedDay);
  const done=!!obj[`${si}_${ei}`];

  document.getElementById('modalTitle').textContent=ex.name;
  document.getElementById('modalSets').innerHTML=`<div class="modal-sets-badge">${ex.sets}</div>`;

  // Info rows
  let infoHtml='';
  if(info.muscles) infoHtml+=`<div class="modal-info-row"><div class="modal-info-icon">💪</div><div><div class="modal-info-label">Muscles</div><div class="modal-info-val">${info.muscles}</div></div></div>`;
  if(info.tips)    infoHtml+=`<div class="modal-info-row"><div class="modal-info-icon">💡</div><div><div class="modal-info-label">Conseil</div><div class="modal-info-val">${info.tips}</div></div></div>`;
  if(info.repos)   infoHtml+=`<div class="modal-info-row"><div class="modal-info-icon">⏱️</div><div><div class="modal-info-label">Repos</div><div class="modal-info-val">${info.repos}</div></div></div>`;
  if(ex.note)      infoHtml+=`<div class="modal-info-row"><div class="modal-info-icon">📝</div><div><div class="modal-info-label">Note</div><div class="modal-info-val">${ex.note}</div></div></div>`;
  document.getElementById('modalInfo').innerHTML=infoHtml;

  const btn=document.getElementById('modalDoneBtn');
  btn.textContent=done?'✓ Exercice terminé':'Marquer comme terminé ✓';
  btn.className='modal-done-btn'+(done?' already-done':'');

  // Show modal
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';

  // Load GIF
  const gifArea=document.getElementById('modalGifArea');
  gifArea.innerHTML='<div class="modal-gif-loading"><div class="spinner"></div><span>Chargement du GIF…</span></div>';

  const gifUrl=await fetchGif(ex.name);
  if(gifUrl){
    gifArea.innerHTML=`<img class="modal-gif" src="${gifUrl}" alt="${ex.name}" loading="lazy">`;
  } else {
    gifArea.innerHTML=`<div class="modal-gif-error">😕 GIF non disponible<br><span style="font-size:11px;margin-top:6px;display:block">Consulte YouTube pour la démonstration</span></div>`;
  }
}

async function fetchGif(exName) {
  // Try wger.de API first
  const wgerId=WGER_IDS[exName];
  if(wgerId){
    try{
      const r=await fetch(`https://wger.de/api/v2/exerciseimage/?format=json&exercise_base=${wgerId}&is_main=true&language=2`,{signal:AbortSignal.timeout(5000)});
      if(r.ok){
        const d=await r.json();
        if(d.results&&d.results.length>0) return d.results[0].image;
      }
    }catch{}
    // Try without language filter
    try{
      const r=await fetch(`https://wger.de/api/v2/exerciseimage/?format=json&exercise_base=${wgerId}`,{signal:AbortSignal.timeout(5000)});
      if(r.ok){
        const d=await r.json();
        if(d.results&&d.results.length>0) return d.results[0].image;
      }
    }catch{}
  }
  // Fallback static GIFs
  return FALLBACK_GIFS[exName]||null;
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
  modalSi=null; modalEi=null;
}

function closeModalOutside(e){
  if(e.target===document.getElementById('modal')) closeModal();
}

function toggleFromModal(){
  if(modalSi===null||modalEi===null) return;
  const obj=getChecked(weekOffset,selectedDay);
  const k=`${modalSi}_${modalEi}`;
  obj[k]=!obj[k];
  setChecked(weekOffset,selectedDay,obj);
  const done=obj[k];
  const btn=document.getElementById('modalDoneBtn');
  btn.textContent=done?'✓ Exercice terminé':'Marquer comme terminé ✓';
  btn.className='modal-done-btn'+(done?' already-done':'');
  renderMain();
}

/* ── NAV ── */
function changeWeek(dir){weekOffset+=dir;selectedDay=null;render()}
function selectDay(idx){selectedDay=idx;renderStrip();renderMain()}
function showPage(page){
  document.getElementById('pageHome').classList.toggle('active-page',page==='home');
  document.getElementById('pageStats').classList.toggle('active-page',page==='stats');
  document.getElementById('navHome').classList.toggle('active-nav',page==='home');
  document.getElementById('navStats').classList.toggle('active-nav',page==='stats');
  if(page==='stats') renderStats();
}

/* ── PROGRESS ── */
function getDayProgress(w,d){
  const p=PROGRAM[d]; if(p.rest) return null;
  const obj=getChecked(w,d); let total=0,done=0;
  p.sections.forEach((s,si)=>s.exercises.forEach((_,ei)=>{total++;if(obj[`${si}_${ei}`])done++;}));
  return{total,done,pct:total>0?Math.round(done/total*100):0};
}

/* ── RENDER STRIP ── */
function renderStrip(){
  const mon=getMonday(weekOffset);
  const strip=document.getElementById('dayStrip');
  strip.innerHTML='';
  for(let i=0;i<7;i++){
    const d=new Date(mon); d.setDate(mon.getDate()+i);
    const isSel=selectedDay===i, isTod=isToday(d)&&weekOffset===0;
    const pill=document.createElement('div');
    pill.className='day-pill'+(isSel?' active':'')+(isTod&&!isSel?' today-pill':'');
    pill.onclick=()=>selectDay(i);
    const pr=getDayProgress(weekOffset,i);
    const dotC=pr&&pr.pct===100?'var(--accent)':(pr?'var(--text3)':'#333');
    pill.innerHTML=`<span class="dpn">${DAYS_SHORT[i]}</span><span class="dnum">${d.getDate()}</span><div class="ddot" style="background:${isSel?'#0a0a0a55':dotC}"></div>`;
    strip.appendChild(pill);
  }
  const mon2=getMonday(weekOffset), sun=new Date(mon2); sun.setDate(mon2.getDate()+6);
  document.getElementById('weekLabel').textContent=`${mon2.getDate()} ${MONTHS[mon2.getMonth()]} – ${sun.getDate()} ${MONTHS[sun.getMonth()]}`;
}

/* ── RENDER MAIN ── */
function renderMain(){
  const prog=PROGRAM[selectedDay];
  const main=document.getElementById('mainContent');

  const isIos=/iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone=window.navigator.standalone;
  const bannerDismissed=localStorage.getItem('tw_banner')==='1';
  let bannerHtml='';
  if(isIos&&!isStandalone&&!bannerDismissed){
    bannerHtml=`<div class="install-banner" onclick="dismissBanner()"><span>📲 Partage → "Sur l'écran d'accueil" pour installer</span><button onclick="event.stopPropagation();dismissBanner()">✕</button></div>`;
  }

  if(prog.rest){
    main.innerHTML=`${bannerHtml}
      <div class="hero-card"><img class="hero-img" src="${prog.img}" alt="${prog.label}" loading="lazy">
        <div class="hero-overlay"><span class="hero-tag" style="background:${prog.color}22;color:${prog.color}">${prog.tag.toUpperCase()}</span>
          <div class="hero-title">${prog.name}</div><div class="hero-sub">${prog.subtitle}</div></div></div>
      <div class="note-box" style="border-color:${prog.color}">${prog.note||''}</div>`;
    return;
  }

  const pr=getDayProgress(weekOffset,selectedDay);
  const obj=getChecked(weekOffset,selectedDay);
  let sectionsHtml='';

  prog.sections.forEach((sec,si)=>{
    let exHtml='';
    sec.exercises.forEach((ex,ei)=>{
      const done=!!obj[`${si}_${ei}`];
      exHtml+=`
        <div class="ex-card ${done?'done-card':''}">
          <div class="ex-card-inner">
            <div class="ex-thumb-wrap" onclick="openModal(${si},${ei})">
              <img class="ex-thumb" src="${ex.img}" alt="${ex.name}" loading="lazy">
              <div class="play-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
            </div>
            <div class="ex-body" onclick="openModal(${si},${ei})">
              <div class="ex-name">${ex.name}</div>
              <div class="ex-sets">${ex.sets}</div>
              ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
              <div class="ex-gif-hint">▶ Voir le GIF</div>
            </div>
            <button class="ex-check-btn ${done?'checked':''}" onclick="toggleEx(${si},${ei})" aria-label="Marquer comme fait">
              ${done?'✓':'○'}
            </button>
          </div>
        </div>`;
    });
    sectionsHtml+=`<div class="section-label">${sec.title}</div>${exHtml}`;
  });

  main.innerHTML=`${bannerHtml}
    <div class="hero-card"><img class="hero-img" src="${prog.img}" alt="${prog.label}" loading="lazy">
      <div class="hero-overlay"><span class="hero-tag" style="background:${prog.color}33;color:${prog.color}">${prog.label.toUpperCase()}</span>
        <div class="hero-title">${prog.name}</div><div class="hero-sub">${prog.subtitle}</div></div></div>
    <div class="progress-section">
      <div class="progress-pct">${pr.pct}%</div>
      <div class="progress-text">${pr.done}/${pr.total} exercices complétés</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pr.pct}%"></div></div>
    </div>
    ${sectionsHtml}
    ${prog.note?`<div class="note-box">${prog.note}</div>`:''}
    <button class="reset-btn" onclick="resetDay()">Réinitialiser cette séance</button>`;
}

function toggleEx(si,ei){
  const obj=getChecked(weekOffset,selectedDay);
  const k=`${si}_${ei}`; obj[k]=!obj[k];
  setChecked(weekOffset,selectedDay,obj); renderMain();
}

function resetDay(){setChecked(weekOffset,selectedDay,{});renderMain()}
function dismissBanner(){localStorage.setItem('tw_banner','1');renderMain()}

/* ── STATS ── */
function renderStats(){
  const content=document.getElementById('statsContent');
  let totalSessions=0,totalEx=0,histHtml='';
  for(let w=0;w>=-4;w--){
    const mon=getMonday(w);
    const label=w===0?'Cette semaine':`Semaine du ${mon.getDate()} ${MONTHS[mon.getMonth()]}`;
    let wd=0,wt=0;
    for(let d=0;d<7;d++){const pr=getDayProgress(w,d);if(pr){wd+=pr.done;wt+=pr.total;totalEx+=pr.done;if(pr.done>0)totalSessions++;}}
    const pct=wt>0?Math.round(wd/wt*100):0;
    if(wt>0) histHtml+=`<div class="history-row"><span class="history-row-day">${label}</span><span class="history-row-pct">${pct}% <span style="color:var(--text3);font-weight:400">(${wd}/${wt})</span></span></div>`;
  }
  content.innerHTML=`
    <div class="section-label" style="margin-top:8px">Vue d'ensemble</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${totalSessions}</div><div class="stat-label">Séances actives</div></div>
      <div class="stat-card"><div class="stat-num">${totalEx}</div><div class="stat-label">Exercices complétés</div></div>
    </div>
    <div class="section-label">Historique</div>
    <div class="week-history">${histHtml||'<p style="color:var(--text3);font-size:13px;padding:12px 0">Aucune donnée encore.</p>'}</div>`;
}

/* ── INIT ── */
function render(){
  if(selectedDay===null){const t=new Date(),dow=t.getDay();selectedDay=dow===0?6:dow-1;}
  renderStrip(); renderMain();
}

// Swipe to close modal
let touchStartY=0;
document.getElementById('modalSheet').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY},{passive:true});
document.getElementById('modalSheet').addEventListener('touchmove',e=>{
  if(e.touches[0].clientY-touchStartY>80) closeModal();
},{passive:true});

render();
</script>
